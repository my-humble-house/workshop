<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Claude 工作坊 課前調查</title>
<style>
/* ============================================================
   寒舍集團・Claude 工作坊 課前調查（方案 C：桌面雙欄版）
   設計規範見 設計規範.html — 所有顏色、陰影、字級皆來自下方 tokens
   ============================================================ */

/* ===== 1. Design tokens ===== */
:root{
  /* 色彩（取樣自 mhh-group.com：深藍黑、紙白、沉穩綠、墨色） */
  --c-night:#142028;            /* 側欄底、深色帶 */
  --c-night-line:rgba(233,230,223,.35);
  --c-paper:#FFFFFF;            /* 卡片、輸入欄 */
  --c-bg:#F4F3F0;               /* 內容區底 */
  --c-bg-deep:#EFEAE1;          /* 內容區漸層尾端（暖） */
  --c-ink:#272520;              /* 主要文字 */
  --c-muted:#6E6A61;            /* 次要文字 */
  --c-cream:#E9E6DF;            /* 深色底上的文字 */
  --c-accent:#3B5D6B;           /* 強調：選中、主按鈕、進度 */
  --c-accent-deep:#284450;      /* 強調 hover/重壓 */
  --c-accent-soft:rgba(59,93,107,.09);
  --c-sage:#9FB8AB;             /* 深色底上的強調綠 */
  --c-bronze:#81603F;           /* 警示/資安重點（不用紅） */
  --c-line:rgba(44,42,36,.16);
  --c-line-strong:rgba(44,42,36,.38);

  /* 邊界陰影與光暈 */
  --shadow-side:6px 0 28px rgba(20,32,40,.16);                            /* 側欄右緣 */
  --shadow-card:0 2px 6px rgba(20,32,40,.05),0 14px 34px rgba(20,32,40,.08);
  --shadow-card-hover:0 4px 10px rgba(20,32,40,.07),0 18px 44px rgba(20,32,40,.12);
  --glow-accent:0 0 0 3px rgba(59,93,107,.14),0 6px 20px rgba(59,93,107,.16);  /* 選中 */
  --glow-focus:0 0 0 3px rgba(59,93,107,.18),0 6px 18px rgba(59,93,107,.12);   /* 輸入聚焦 */
  --glow-sage:0 0 14px rgba(159,184,171,.55);                              /* 深色底上的綠光 */
  --shadow-btn:0 6px 18px rgba(59,93,107,.22);
  --shadow-btn-hover:0 8px 26px rgba(59,93,107,.32);

  /* 字體 */
  --font-display:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;     /* 標題、大數字 */
  --font-body:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;

  /* 圓角 */
  --r-s:2px;   /* 輸入欄、按鈕、選項 */
  --r-m:5px;   /* 卡片 */
}

/* ===== 2. Base ===== */
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{font-family:var(--font-body);background:var(--c-bg);color:var(--c-ink);line-height:1.7;font-size:16px}
button{font-family:inherit}
input,textarea{font-family:inherit}

/* ===== 3. 版面：側欄 + 內容 ===== */
.app{display:grid;grid-template-columns:300px minmax(0,1fr);min-height:100vh}
.side{
  background:var(--c-night);color:var(--c-cream);
  display:flex;flex-direction:column;
  padding:36px 28px 30px;
  position:sticky;top:0;height:100vh;
  box-shadow:var(--shadow-side);z-index:2;
}
.side-brand{display:flex;flex-direction:column;gap:2px}
.side-logo{width:86px;height:auto;display:block;margin-bottom:16px}
.side-kicker{font-size:10.5px;font-weight:600;letter-spacing:.32em;color:var(--c-sage)}
.side-title{font-family:var(--font-display);font-size:25px;font-weight:700;letter-spacing:.12em;color:#F4F1EA}
.main{padding:66px 76px 80px;background:linear-gradient(160deg,#F6F5F2 0%,var(--c-bg) 60%,var(--c-bg-deep) 100%)}
.content{max-width:680px}

/* ===== 4. 側欄：部分清單（空心圈 → 打勾） ===== */
.checklist{list-style:none;margin-top:40px;display:flex;flex-direction:column;gap:5px}
.checklist li{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:var(--r-m);
  font-size:14.5px;color:rgba(233,230,223,.48);
  transition:background .25s ease,color .25s ease;
}
.checklist li.current{background:rgba(255,255,255,.08);color:#FFFFFF}
.checklist li.done{color:rgba(233,230,223,.8)}
.cl-mark{
  flex:none;width:18px;height:18px;display:grid;place-items:center;
  border:1.5px solid var(--c-night-line);border-radius:50%;
  transition:border-color .25s ease,background .25s ease,box-shadow .25s ease;
}
.checklist li.current .cl-mark{border-color:var(--c-sage);box-shadow:var(--glow-sage)}
.checklist li.done .cl-mark{background:var(--c-sage);border-color:var(--c-sage)}
.checklist li.done .cl-mark::after{
  content:"";width:4px;height:8px;margin-top:-2px;
  border-right:2px solid var(--c-night);border-bottom:2px solid var(--c-night);transform:rotate(42deg);
}
.cl-title{flex:1;font-weight:600}
.cl-count{font-size:11.5px;opacity:.55;font-variant-numeric:tabular-nums}
.side-foot{margin-top:auto;padding-top:20px}
.side-count{font-size:13px;color:rgba(233,230,223,.66);font-variant-numeric:tabular-nums}
.side-count strong{font-size:17px;color:#FFFFFF}
.side-bar{height:3px;background:rgba(255,255,255,.14);margin-top:10px;border-radius:99px;overflow:hidden}
.side-bar i{display:block;height:100%;background:var(--c-sage);transition:width .35s ease;box-shadow:var(--glow-sage)}

/* ===== 5. 文字階層 ===== */
.sv-display{font-family:var(--font-display);font-weight:700;letter-spacing:.06em}
.sv-kicker{font-size:12px;font-weight:700;letter-spacing:.24em;color:var(--c-accent);margin-bottom:10px}
.sv-title{font-family:var(--font-display);font-size:29px;font-weight:700;line-height:1.45;letter-spacing:.03em;margin-bottom:8px;text-wrap:pretty}
.sv-hint{font-size:14px;color:var(--c-muted);margin-bottom:18px}
.sv-lede{font-size:16px;color:var(--c-muted);max-width:34em;margin-bottom:26px;text-wrap:pretty}
.sv-label{display:flex;align-items:baseline;gap:10px;font-size:15px;font-weight:600;margin-bottom:8px}
.sv-label-note{font-size:13px;font-weight:400;color:var(--c-muted)}
.sv-req{font-style:normal;font-size:11px;font-weight:700;letter-spacing:.1em;color:#fff;background:var(--c-accent);border-radius:var(--r-s);padding:1px 8px}

/* ===== 6. 步驟切換動畫 ===== */
@media (prefers-reduced-motion: no-preference){
  .sv-step.from-right{animation:svFromRight .38s cubic-bezier(.2,.75,.25,1)}
  .sv-step.from-left{animation:svFromLeft .38s cubic-bezier(.2,.75,.25,1)}
}
@keyframes svFromRight{from{transform:translateX(26px)}to{transform:none}}
@keyframes svFromLeft{from{transform:translateX(-26px)}to{transform:none}}

/* ===== 7. 選項 ===== */
.sv-options{display:flex;flex-direction:column;gap:9px;margin-bottom:22px}
.sv-opt{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  font-size:16px;color:var(--c-ink);line-height:1.55;
  background:var(--c-paper);border:1px solid var(--c-line);border-radius:var(--r-s);
  padding:13px 18px;cursor:pointer;box-shadow:var(--shadow-card);
  transition:border-color .15s ease,background .15s ease,box-shadow .15s ease,transform .15s ease;
}
.sv-opt:hover{border-color:var(--c-line-strong);box-shadow:var(--shadow-card-hover)}
.sv-opt:focus-visible{outline:2px solid var(--c-accent);outline-offset:2px}
.sv-opt.selected{border-color:var(--c-accent);background:var(--c-accent-soft);font-weight:600;box-shadow:var(--glow-accent)}
@media (prefers-reduced-motion: no-preference){.sv-opt:active{transform:scale(.99)}}
.sv-mark{flex:none;width:20px;height:20px;border:1.5px solid var(--c-line-strong);position:relative;transition:background .15s ease,border-color .15s ease}
.sv-mark.radio{border-radius:50%}
.sv-mark.check{border-radius:5px}
.sv-mark.on{background:var(--c-accent);border-color:var(--c-accent)}
.sv-mark.radio.on::after{content:"";position:absolute;inset:4.5px;border-radius:50%;background:#fff}
.sv-mark.check.on::after{
  content:"";position:absolute;left:4.5px;top:2.5px;width:7px;height:11px;
  border-right:2.5px solid #fff;border-bottom:2.5px solid #fff;transform:rotate(42deg);
}
@media (prefers-reduced-motion: no-preference){
  .sv-mark.check.on::after{animation:svPop .22s cubic-bezier(.3,1.6,.5,1)}
  .sv-mark.radio.on::after{animation:svPopDot .22s cubic-bezier(.3,1.6,.5,1)}
}
@keyframes svPop{from{transform:scale(.8) rotate(42deg)}to{transform:scale(1) rotate(42deg)}}
@keyframes svPopDot{from{transform:scale(.85)}to{transform:scale(1)}}
.sv-other{padding-left:34px}
.sv-other input{width:100%}

/* ===== 8. 主題卡（Q14） ===== */
.sv-topic-count{font-size:14px;color:var(--c-muted);margin-bottom:12px}
.sv-topic-count strong{color:var(--c-accent);font-size:18px}
.sv-topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
@media (max-width:680px){.sv-topic-grid{grid-template-columns:1fr}}
.sv-topic{
  display:flex;align-items:flex-start;gap:12px;text-align:left;
  font-size:15px;line-height:1.5;color:var(--c-ink);
  background:var(--c-paper);border:1px solid var(--c-line);border-radius:var(--r-s);
  padding:14px 16px;cursor:pointer;box-shadow:var(--shadow-card);
  transition:border-color .15s ease,background .15s ease,box-shadow .15s ease;
}
.sv-topic:hover{border-color:var(--c-line-strong);box-shadow:var(--shadow-card-hover)}
.sv-topic:focus-visible{outline:2px solid var(--c-accent);outline-offset:2px}
.sv-topic.selected{border-color:var(--c-accent);background:var(--c-accent-soft);box-shadow:var(--glow-accent)}
.sv-topic-code{
  flex:none;width:26px;height:26px;display:grid;place-items:center;
  font-family:var(--font-display);font-size:14px;font-weight:700;
  border:1px solid var(--c-line-strong);border-radius:var(--r-s);color:var(--c-muted);
}
.sv-topic.selected .sv-topic-code{background:var(--c-accent);border-color:var(--c-accent);color:#fff}
.sv-topic-label{flex:1}
.sv-topic .sv-mark{margin-top:3px;width:18px;height:18px;opacity:0}
.sv-topic.selected .sv-mark{opacity:1}
.sv-topic.selected .sv-mark.check.on::after{left:4px;top:1.5px;width:6px;height:10px}

/* ===== 9. 晶片 ===== */
.sv-chips{display:flex;flex-wrap:wrap;gap:8px}
.sv-chip{
  font-size:15px;color:var(--c-ink);background:var(--c-paper);
  border:1px solid var(--c-line);border-radius:99px;padding:8px 18px;cursor:pointer;
  box-shadow:var(--shadow-card);
  transition:border-color .15s ease,background .15s ease,color .15s ease,box-shadow .15s ease;
}
.sv-chip:hover{border-color:var(--c-line-strong);box-shadow:var(--shadow-card-hover)}
.sv-chip:focus-visible{outline:2px solid var(--c-accent);outline-offset:2px}
.sv-chip.selected{background:var(--c-accent);border-color:var(--c-accent);color:#fff;font-weight:600;box-shadow:var(--glow-accent)}

/* ===== 10. 欄位 ===== */
.sv-fields{display:flex;flex-direction:column;gap:20px;margin-bottom:22px}
.sv-field{}
input[type=text],textarea{
  width:100%;font-size:16px;color:var(--c-ink);line-height:1.6;
  border:1px solid var(--c-line);border-radius:var(--r-s);
  padding:12px 16px;background:var(--c-paper);
}
input[type=text]::placeholder,textarea::placeholder{color:var(--c-muted);opacity:.7}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--c-accent);box-shadow:var(--glow-focus)}
textarea{min-height:84px;resize:vertical}

/* ===== 11. 按鈕與導覽 ===== */
.sv-nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:6px}
.sv-btn{
  font-size:16px;font-weight:600;border-radius:var(--r-s);
  padding:12px 30px;cursor:pointer;border:1px solid transparent;
  transition:background .15s ease,box-shadow .15s ease,transform .15s ease;
}
.sv-btn:focus-visible{outline:2px solid var(--c-accent);outline-offset:2px}
.sv-btn.primary{background:var(--c-accent);color:#fff;box-shadow:var(--shadow-btn)}
.sv-btn.primary:hover{background:var(--c-accent-deep);box-shadow:var(--shadow-btn-hover)}
.sv-btn.primary:disabled{opacity:.6;cursor:default}
@media (prefers-reduced-motion: no-preference){.sv-btn.primary:active{transform:scale(.98)}}
.sv-btn.ghost{background:none;color:var(--c-muted);padding:12px 12px;box-shadow:none}
.sv-btn.ghost:hover{color:var(--c-ink);text-decoration:underline}

/* ===== 12. 錯誤提示 ===== */
.sv-error{
  width:fit-content;font-size:14px;font-weight:600;color:var(--c-accent-deep);
  background:var(--c-accent-soft);border-left:3px solid var(--c-accent);
  padding:7px 14px;margin:0 0 16px;border-radius:var(--r-s);
}
@media (prefers-reduced-motion: no-preference){.sv-error{animation:svShake .3s ease}}
@keyframes svShake{0%,100%{transform:none}30%{transform:translateX(-5px)}60%{transform:translateX(4px)}}

/* ===== 13. 歡迎頁 ===== */
.sv-welcome .sv-display{font-size:46px;margin-bottom:14px}
.sv-gate{margin-top:4px}
.sv-gate-row{display:flex;gap:10px}
.sv-gate-row input{flex:1}
.sv-gate-row .sv-btn{flex:none;white-space:nowrap}
.sv-demo-note{font-size:12.5px;color:var(--c-muted);margin-top:10px;font-family:ui-monospace,monospace;letter-spacing:.02em}
.sv-gate .sv-error{margin-top:12px;margin-bottom:0}

/* ===== 14. 部分過場頁 ===== */
.sv-section{
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:6px;
  width:100%;min-height:56vh;text-align:left;background:none;border:0;cursor:pointer;color:inherit;
}
.sv-section-num{font-family:var(--font-display);font-size:96px;font-weight:700;line-height:1.1;color:var(--c-accent);opacity:.92}
.sv-section-meta{font-size:13px;font-weight:600;letter-spacing:.26em;color:var(--c-muted)}
.sv-section-title{font-size:32px;margin-top:2px}
.sv-section-blurb{font-size:16px;color:var(--c-muted);margin-top:6px}
.sv-section-skip{font-size:12.5px;color:var(--c-muted);opacity:.7;margin-top:26px;letter-spacing:.1em}
@media (prefers-reduced-motion: no-preference){
  .sv-section > *{animation:svRise .5s cubic-bezier(.2,.75,.25,1) both}
  .sv-section-title{animation-delay:.06s}
  .sv-section-blurb{animation-delay:.12s}
  .sv-section-skip{animation-delay:.4s}
}
@keyframes svRise{from{transform:translateY(12px)}to{transform:none}}

/* ===== 15. 實作頁 ===== */
.sv-subq{margin-bottom:22px}
.sv-note-toggle{background:none;border:0;font-size:13px;color:var(--c-accent);cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-weight:400}
.sv-note{font-size:13.5px;color:var(--c-muted);background:var(--c-accent-soft);border-radius:var(--r-s);padding:10px 14px;margin-bottom:10px;max-width:46em}

/* ===== 16. 完成頁與統計 ===== */
.st-sending{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;min-height:320px;color:var(--c-muted)}
.st-spinner{width:34px;height:34px;border:3px solid var(--c-accent-soft);border-top-color:var(--c-accent);border-radius:50%}
@media (prefers-reduced-motion: no-preference){.st-spinner{animation:stSpin .8s linear infinite}}
@keyframes stSpin{to{transform:rotate(360deg)}}
.st-confirm{display:flex;align-items:center;gap:18px;margin-bottom:26px}
.st-check{flex:none;width:52px;height:52px;border-radius:50%;background:var(--c-accent);position:relative;box-shadow:var(--glow-accent)}
.st-check::after{
  content:"";position:absolute;left:18px;top:13px;width:13px;height:22px;
  border-right:3px solid #fff;border-bottom:3px solid #fff;transform:rotate(42deg);
}
@media (prefers-reduced-motion: no-preference){
  .st-check{animation:svPopDot .4s cubic-bezier(.3,1.7,.5,1)}
  .st-check::after{animation:svPop .3s .15s cubic-bezier(.3,1.6,.5,1) both}
}
.st-h{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:.04em;margin:0 0 10px}
.st-sub{font-size:13.5px;color:var(--c-muted);margin-bottom:14px;text-wrap:pretty}
.st-plan{border:1px solid var(--c-line);border-radius:var(--r-m);padding:18px 20px 14px;margin-bottom:18px;background:var(--c-paper);box-shadow:var(--shadow-card)}
.st-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.st-chip{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;border-radius:99px;padding:6px 16px 6px 8px;white-space:nowrap}
.st-chip-code{width:22px;height:22px;display:grid;place-items:center;border-radius:50%;font-family:var(--font-display);font-size:12.5px}
.st-chip.sel{background:var(--c-accent);color:#fff}
.st-chip.sel .st-chip-code{background:rgba(255,255,255,.22)}
.st-chip.diag{border:1.5px solid var(--c-accent);color:var(--c-accent-deep);background:var(--c-paper)}
.st-chip.diag .st-chip-code{background:var(--c-accent-soft);color:var(--c-accent-deep)}
.st-plan .st-sub{margin-bottom:2px}
.st-summary{margin-bottom:24px}
.st-summary-toggle{display:flex;align-items:center;gap:8px;background:none;border:0;cursor:pointer;font-size:14.5px;font-weight:600;color:var(--c-accent-deep);padding:4px 0}
.st-caret{width:8px;height:8px;border-right:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(45deg);margin-top:-3px;transition:transform .2s ease}
.st-summary.open .st-caret{transform:rotate(225deg);margin-top:3px}
.st-summary-body{border:1px solid var(--c-line);border-radius:var(--r-m);padding:16px 20px;margin-top:10px;background:var(--c-paper);box-shadow:var(--shadow-card)}
.st-summary-head{display:flex;flex-wrap:wrap;gap:4px 18px;font-size:14px;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--c-line)}
.st-summary-head strong{margin-right:6px}
.st-summary-body ul{list-style:none;display:flex;flex-direction:column;gap:8px;font-size:14px}
.st-summary-body li strong{display:block;font-weight:600}
.st-summary-body li span{color:var(--c-muted);overflow-wrap:anywhere}
.st-stats{border-top:1px solid var(--c-line);padding-top:20px}
.st-stats-head{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:18px}
.st-switch{display:inline-flex;align-items:center;gap:9px;font-size:14px;font-weight:600;cursor:pointer;color:var(--c-muted)}
.st-switch input{position:absolute;opacity:0;width:0;height:0}
.st-switch-track{width:38px;height:22px;border-radius:99px;background:var(--c-line);position:relative;transition:background .2s ease}
.st-switch-track::after{content:"";position:absolute;left:3px;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s ease;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.st-switch input:checked + .st-switch-track{background:var(--c-accent);box-shadow:var(--glow-accent)}
.st-switch input:checked + .st-switch-track::after{transform:translateX(16px)}
.st-switch input:focus-visible + .st-switch-track{outline:2px solid var(--c-accent);outline-offset:2px}
.st-headline{display:flex;align-items:baseline;gap:14px;margin-bottom:22px}
.st-big{font-family:var(--font-display);font-size:46px;font-weight:700;line-height:1;color:var(--c-accent)}
.st-big-caption{font-size:15px;font-weight:600}
.st-big-caption em{display:block;font-style:normal;font-weight:400;font-size:13px;color:var(--c-muted)}
.st-bar{display:flex;align-items:center;gap:12px;margin-bottom:8px;font-size:14.5px}
.st-bar-rank{flex:none;width:1.4em;font-family:var(--font-display);font-weight:700;color:var(--c-muted);font-size:15px}
.st-bar.accent .st-bar-rank{color:var(--c-accent)}
.st-bar-label{flex:0 0 11.5em;line-height:1.4}
.st-bar-track{flex:1;height:16px;background:var(--c-accent-soft);border-radius:var(--r-s);overflow:hidden}
.st-bar-fill{display:block;height:100%;background:var(--c-line-strong)}
.st-bar.accent .st-bar-fill{background:var(--c-accent)}
.st-bar-num{flex:0 0 1.6em;text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
.st-bar.small{font-size:13.5px;margin-bottom:6px}
.st-bar.small .st-bar-label{flex-basis:9.5em}

<script>

const DEPTS = ["行銷處","數位處","其他"];
const SENS_OPTIONS = ["客人個資或訂位資料","內部成本或財務數字","不確定哪些可以貼"];

/* 診斷規則：由作答推導建議單元 */
function buildDiagnosis(a){
  const diag = new Set();
  if(a.q1 === "還沒用過") diag.add("A");
  if((a.q2||[]).includes("不確定自己用的是哪種")) diag.add("B");
  if(a.q5 === "一個對話從頭用到尾，什麼事都在裡面問") diag.add("C");
  if((a.q10||[]).includes("用到一半被告知額度用完、要等冷卻")) diag.add("C");
  if(a.q6 === "每次對話開頭重新貼一次" || a.q6 === "不知道可以預先設定"){ diag.add("C"); diag.add("D"); }
  if(a.task && a.task.task) diag.add("D");
  if(a.task && a.task.succ === "建好之後可以重複用的模板") diag.add("D");
  if(a.q7 === "整份檔案直接上傳") diag.add("E");
  if((a.q8||[]).some(o => o==="掃描檔或紙本拍照" || o==="手機截圖")) diag.add("E");
  if((a.q10||[]).some(o => o==="數字加總或計算結果出錯" || o==="讀取掃描檔或圖片時認錯字")) diag.add("E");
  if((a.q3||[]).includes("報表或 Excel")) diag.add("E");
  if(a.task && a.task.succ === "數字不再出錯") diag.add("E");
  if((a.q3||[]).includes("社群文案")) diag.add("F");
  if(a.task && a.task.succ === "產出可用的初稿") diag.add("F");
  if((a.q3||[]).some(o => o==="簡報" || o==="互動式工具或圖表")) diag.add("G");
  if(a.q13 === "第一次聽到這兩個詞") diag.add("G");
  if(a.task && a.task.succ === "產出可以直接分享的檔案") diag.add("G");
  if(SENS_OPTIONS.some(o => (a.q11||[]).includes(o))) diag.add("I");
  if(a.q12 === "傳 Artifacts 分享連結") diag.add("I");
  if(a.q13 === "聽過但不確定差別在哪" || a.q13 === "第一次聽到這兩個詞") diag.add("I");
  return [...diag].sort();
}

const SUCC_LABELS  = ["","產出可用的初稿","可重複用的模板","縮短整理時間","數字不再出錯","可直接分享的檔案"];
const MAT_LABELS   = ["","去識別 Excel／CSV","去識別文件","圖片或截圖","只有文字描述","還沒準備好"];

/* 彙整 */
function aggregate(list){
  const g = { n:list.length, deptCount:{}, topicSel:{}, topicDiag:{}, deptTopic:{},
    litCount:[0,0,0,0], sensCount:0, matCount:[0,0,0,0,0,0], limitCount:[0,0,0,0],
    succCount:[0,0,0,0,0,0], tasks:[] };
  list.forEach(d => {
    const dept = d.dept || "其他";
    g.deptCount[dept] = (g.deptCount[dept]||0)+1;
    g.deptTopic[dept] = g.deptTopic[dept] || {};
    (d.topics||[]).forEach(c => {
      g.topicSel[c]=(g.topicSel[c]||0)+1;
      const t = g.deptTopic[dept][c] = g.deptTopic[dept][c] || {sel:0,diag:0}; t.sel++;
    });
    (d.diag||[]).forEach(c => {
      g.topicDiag[c]=(g.topicDiag[c]||0)+1;
      const t = g.deptTopic[dept][c] = g.deptTopic[dept][c] || {sel:0,diag:0}; t.diag++;
    });
    if(d.lit>=1 && d.lit<=3) g.litCount[d.lit]++;
    if(d.sens===1) g.sensCount++;
    (d.mat||[]).forEach(m => { if(m>=1&&m<=5) g.matCount[m]++; });
    if(d.limit>=1 && d.limit<=3) g.limitCount[d.limit]++;
    if(d.succ>=1 && d.succ<=5) g.succCount[d.succ]++;
    if(d.task) g.tasks.push({dept, task:d.task});
  });
  return g;
}

/* ============================================================
   課前調查 app.js（vanilla，無框架）
   - 線上：Cloudflare Worker 驗證通行碼 + 匿名統計（與舊版 API 相容）
   - ?demo=1 或 file: 開啟：跳過驗證、統計用 MOCK_RESPONSES 模擬
   ============================================================ */

const API_BASE = "https://workshop-survey-api.ciracloser.workers.dev";
const DEMO = new URLSearchParams(location.search).has("demo") || location.protocol === "file:";
const AUTO_ADVANCE = true;          // 單選後自動前進
const OTHER = "其他";

/* 選項文字 → 統計代號（與 data.js 的 *_LABELS 對齊） */
const SUCC_CODE  = Object.fromEntries(TASK_BLOCK.q16.options.map((o,i) => [o, i+1]));
const MAT_CODE   = Object.fromEntries(TASK_BLOCK.q17.options.map((o,i) => [o, i+1]));
const LIMIT_CODE = Object.fromEntries(TASK_BLOCK.q18.options.map((o,i) => [o, i+1]));
const LIT_CODE   = Object.fromEntries(QUESTIONS.find(q => q.id === "q13").options.map((o,i) => [o, i+1]));

/* ===== 步驟表 ===== */
const STEPS = (() => {
  const s = [{kind:"welcome"}, {kind:"profile"}];
  PARTS.forEach(p => {
    p.qs.forEach(qid => s.push(qid === "task"
      ? {kind:"task", part:p}
      : {kind:"question", part:p, q:QUESTIONS.find(q => q.id === qid)}));
  });
  s.push({kind:"done"});
  return s;
})();
const Q_TOTAL = STEPS.filter(s => s.kind === "question" || s.kind === "task").length;
function qNumberAt(i){
  let n = 0;
  for(let k = 0; k <= i; k++) if(STEPS[k].kind === "question" || STEPS[k].kind === "task") n++;
  return n;
}

/* ===== 狀態 ===== */
let stepIdx = 0, dirn = 1, sectionTimer = null;
const answers = (() => {
  const a = { name:"", dept:"", job:"" };
  QUESTIONS.forEach(q => { a[q.id] = (q.type === "multi" || q.type === "topics") ? [] : ""; });
  a.task = { task:"", now:"", succ:"", mat:[], limit:"" };
  return a;
})();
const otherTexts = {};
let classCode = "";
try{ classCode = sessionStorage.getItem("classCode") || ""; }catch(e){}
let gateOk = DEMO;

const $app = document.getElementById("app");
const $screen = document.getElementById("screen");

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ===== 導覽 ===== */
function go(i, d){
  clearTimeout(sectionTimer);
  dirn = d; stepIdx = Math.max(0, Math.min(i, STEPS.length - 1));
  render();
}
function next(){ go(stepIdx + 1, 1); }
function back(){
  let i = stepIdx - 1;
  while(i > 0 && STEPS[i].kind === "section") i--;   // 回上一步略過過場頁
  go(i, -1);
}

/* ===== 渲染 ===== */
function render(){
  const step = STEPS[stepIdx];
  $app.dataset.kind = step.kind;
  renderSidebar(step);
  const wrap = document.createElement("div");
  wrap.className = "sv-step " + (dirn >= 0 ? "from-right" : "from-left");
  wrap.innerHTML = ({
    welcome: htmlWelcome, profile: htmlProfile, section: htmlSection,
    question: htmlQuestion, task: htmlTask, done: htmlDone
  })[step.kind](step);
  $screen.replaceChildren(wrap);
  ({ welcome: bindWelcome, profile: bindProfile, section: bindSection,
     question: bindQuestion, task: bindTask, done: bindDone })[step.kind](step);
  window.scrollTo(0, 0);
}

function renderSidebar(step){
  const partIdx = step.part ? PARTS.findIndex(p => p.id === step.part.id)
                : (step.kind === "done" ? PARTS.length : -1);
  document.getElementById("checklist").innerHTML = PARTS.map((p, i) => {
    const status = step.kind === "done" ? "done" : (i < partIdx ? "done" : i === partIdx ? "current" : "todo");
    const count = p.qs.length === 1 && p.qs[0] === "task" ? "1 頁" : p.qs.length + " 題";
    return '<li class="' + status + '"><span class="cl-mark"></span>' +
      '<span class="cl-title">' + p.title + '</span><span class="cl-count">' + count + '</span></li>';
  }).join("");
  const qn = qNumberAt(stepIdx);
  const $count = document.getElementById("sideCount");
  if(step.kind === "welcome" || step.kind === "profile") $count.innerHTML = Q_TOTAL + " 題・約 7 分鐘";
  else if(step.kind === "done") $count.innerHTML = "已完成，感謝填寫";
  else $count.innerHTML = "<strong>" + String(qn).padStart(2,"0") + "</strong>／" + Q_TOTAL + " 題";
  document.getElementById("sideBarFill").style.width =
    (step.kind === "done" ? 100 : Math.round(qn / Q_TOTAL * 100)) + "%";
}

/* ===== 共用片段 ===== */
function htmlOptions(q){
  const v = answers[q.id];
  const isMulti = q.type === "multi";
  const opts = q.other ? q.options.concat(OTHER) : q.options;
  const showOther = q.other && (isMulti ? v.includes(OTHER) : v === OTHER);
  return '<div class="sv-options" id="opts">' +
    opts.map(o => {
      const sel = isMulti ? v.includes(o) : v === o;
      return '<button type="button" class="sv-opt' + (sel ? " selected" : "") + '" data-val="' + esc(o) + '" aria-pressed="' + sel + '">' +
        '<span class="sv-mark ' + (isMulti ? "check" : "radio") + (sel ? " on" : "") + '"></span>' +
        '<span class="sv-opt-text">' + esc(o) + '</span></button>';
    }).join("") +
    '<div class="sv-other" id="otherWrap" style="' + (showOther ? "" : "display:none") + '">' +
      '<input type="text" id="otherInput" placeholder="請補充說明" value="' + esc(otherTexts[q.id] || "") + '"></div>' +
  '</div>';
}

function htmlChips(id, options, value, multi){
  return '<div class="sv-chips" data-chips="' + id + '">' +
    options.map(o => {
      const sel = multi ? value.includes(o) : value === o;
      return '<button type="button" class="sv-chip' + (sel ? " selected" : "") + '" data-val="' + esc(o) + '" aria-pressed="' + sel + '">' + esc(o) + '</button>';
    }).join("") + '</div>';
}

function htmlError(){ return '<p class="sv-error" id="err" style="display:none"></p>'; }
function showErr(msg){
  const $e = document.getElementById("err");
  if(!$e) return;
  $e.textContent = msg; $e.style.display = "block";
}
function hideErr(){
  const $e = document.getElementById("err");
  if($e) $e.style.display = "none";
}

/* ===== 歡迎頁（通行碼合併） ===== */
function htmlWelcome(){
  return '<div class="sv-welcome">' +
    '<p class="sv-kicker">CLAUDE 工作坊</p>' +
    '<h1 class="sv-display">課前調查</h1>' +
    '<p class="sv-lede">' + Q_TOTAL + ' 題，約 7 分鐘。你的回答會直接決定課程怎麼安排、實作帶你做什麼——沒有對錯，照實填就好。</p>' +
    '<div class="sv-gate">' +
      (gateOk
        ? '<div class="sv-nav"><span></span><button class="sv-btn primary" id="startBtn">開始填寫</button></div>' +
          (DEMO ? '<p class="sv-demo-note">示範模式：統計為模擬資料</p>' : "")
        : '<label class="sv-label" for="gCode">課程通行碼<span class="sv-label-note">寫在課程公告裡</span></label>' +
          '<div class="sv-gate-row">' +
            '<input type="text" id="gCode" autocomplete="off" value="' + esc(classCode) + '">' +
            '<button class="sv-btn primary" id="startBtn">開始填寫</button>' +
          '</div><p class="sv-error" id="err" style="display:none"></p>') +
    '</div></div>';
}
function bindWelcome(){
  const $btn = document.getElementById("startBtn");
  const $input = document.getElementById("gCode");
  async function start(){
    if(gateOk){ next(); return; }
    const code = $input.value.trim();
    if(!code){ showErr("請輸入課程公告裡的通行碼"); $input.focus(); return; }
    $btn.disabled = true; $btn.textContent = "驗證中…"; hideErr();
    try{
      const r = await fetch(API_BASE + "/api/verify", { headers: {"X-Class-Code": code} });
      if(r.ok){
        classCode = code;
        try{ sessionStorage.setItem("classCode", code); }catch(e){}
        gateOk = true; next(); return;
      }
      showErr(r.status === 403 ? "通行碼不正確，請確認課程公告" : "驗證服務暫時無法使用，請稍後再試");
    }catch(e){
      showErr("連線失敗，請確認網路後再試");
    }
    $btn.disabled = false; $btn.textContent = "開始填寫";
    $input.focus();
  }
  $btn.addEventListener("click", start);
  if($input){
    $input.addEventListener("keydown", e => { if(e.key === "Enter") start(); });
    $input.focus();
  }
}

function htmlProfile(){

    '<h2 class="sv-title">先認識你一下</h2>' +
    '<div class="sv-fields">' +
      '<div class="sv-field"><label class="sv-label" for="fName">姓名</label>' +

function bindChips(id, onPick, multi, getValue){
  document.querySelectorAll('[data-chips="' + id + '"] .sv-chip').forEach(b => {
    b.addEventListener("click", () => {
      if(multi){
        const arr = getValue();
        const i = arr.indexOf(b.dataset.val);
        if(i >= 0) arr.splice(i, 1); else arr.push(b.dataset.val);
        b.classList.toggle("selected");
        onPick(arr);
      } else {
        document.querySelectorAll('[data-chips="' + id + '"] .sv-chip').forEach(x => x.classList.remove("selected"));
        b.classList.add("selected");
        onPick(b.dataset.val);
      }
    });
  });
}

/* ===== 部分過場頁 ===== */
function htmlSection(step){
  const p = step.part;
  const i = PARTS.findIndex(x => x.id === p.id);
  return '<button type="button" class="sv-section" id="secBtn">' +
    '<span class="sv-section-num">' + p.num + '</span>' +

  sectionTimer = setTimeout(next, 1800);
}

/* ===== 題目頁 ===== */
function htmlQuestion(step){
  const q = step.q;
  const qn = qNumberAt(stepIdx);
  const body = q.type === "topics" ? htmlTopics(q) : htmlOptions(q);
  return '<div><h2 class="sv-title">' + esc(q.title) + '</h2>' +
    (q.hint ? '<p class="sv-hint">' + esc(q.hint) + '</p>' : "") +
    body + htmlError() +
    '<div class="sv-nav"><button class="sv-btn ghost" id="backBtn">上一步</button>' +
    '<button class="sv-btn primary" id="nextBtn">' + (qn === Q_TOTAL ? "完成" : "下一題") + '</button></div></div>';
}
function htmlTopics(q){
  const v = answers[q.id];
  return '<div class="sv-topic-count">已選 <strong id="topicCount">' + v.length + '</strong>／' + q.max + '</div>' +
    '<div class="sv-topic-grid" id="topicGrid">' +
    q.options.map(o => {
      const sel = v.includes(o.code);
      return '<button type="button" class="sv-topic' + (sel ? " selected" : "") + '" data-code="' + o.code + '" aria-pressed="' + sel + '">' +
        '<span class="sv-topic-code">' + o.code + '</span>' +
        '<span class="sv-topic-label">' + esc(o.label) + '</span>' +
        '<span class="sv-mark check on"></span></button>';
    }).join("") + '</div>';
}
function bindQuestion(step){
  const q = step.q;
  document.getElementById("backBtn").addEventListener("click", () => { saveOther(q); back(); });
  document.getElementById("nextBtn").addEventListener("click", () => {
    saveOther(q);
    const v = answers[q.id];
    if(q.type === "single" && !v) return showErr("請選擇一個選項");
    if((q.type === "multi" || q.type === "topics") && v.length === 0) return showErr("請至少選擇一個選項");
    const hasOther = q.type === "single" ? v === OTHER : Array.isArray(v) && v.includes(OTHER);
    if(q.other && hasOther && !(otherTexts[q.id]||"").trim()){
      showErr("你選了「其他」，請補充說明");
      const $o = document.getElementById("otherInput"); if($o) $o.focus();
      return;
    }
    next();
  });
  if(q.type === "topics"){
    document.querySelectorAll("#topicGrid .sv-topic").forEach(b => {
      b.addEventListener("click", () => {
        const code = b.dataset.code, arr = answers[q.id];
        const i = arr.indexOf(code);
        if(i >= 0){ arr.splice(i,1); b.classList.remove("selected"); }
        else if(arr.length >= q.max){ showErr("最多選 " + q.max + " 個，先取消一個再選"); return; }
        else { arr.push(code); b.classList.add("selected"); }
        hideErr();
        document.getElementById("topicCount").textContent = arr.length;
      });
    });
    return;
  }
  const $otherWrap = document.getElementById("otherWrap");
  const $otherInput = document.getElementById("otherInput");
  if($otherInput){
    $otherInput.addEventListener("input", () => { otherTexts[q.id] = $otherInput.value.trim(); hideErr(); });
    $otherInput.addEventListener("keydown", e => { if(e.key === "Enter") document.getElementById("nextBtn").click(); });
  }
  document.querySelectorAll("#opts .sv-opt").forEach(b => {
    b.addEventListener("click", () => {
      const o = b.dataset.val;
      hideErr();
      if(q.type === "multi"){
        let arr = answers[q.id];
        if(arr.includes(o)) arr.splice(arr.indexOf(o), 1); else arr.push(o);
        if(q.exclusive){
          if(o === q.exclusive && arr.includes(o)){ arr.length = 0; arr.push(q.exclusive); }
          else { const x = arr.indexOf(q.exclusive); if(x >= 0) arr.splice(x, 1); }
        }
        document.querySelectorAll("#opts .sv-opt").forEach(x => {
          const sel = arr.includes(x.dataset.val);
          x.classList.toggle("selected", sel);
          x.querySelector(".sv-mark").classList.toggle("on", sel);
        });
        $otherWrap.style.display = arr.includes(OTHER) ? "" : "none";
        if(o === OTHER && arr.includes(OTHER)) $otherInput.focus();
      } else {
        answers[q.id] = o;
        document.querySelectorAll("#opts .sv-opt").forEach(x => {
          const sel = x.dataset.val === o;
          x.classList.toggle("selected", sel);
          x.querySelector(".sv-mark").classList.toggle("on", sel);
        });
        if(o === OTHER){ $otherWrap.style.display = ""; $otherInput.focus(); }
        else {
          $otherWrap.style.display = "none";
          if(AUTO_ADVANCE) sectionTimer = setTimeout(next, 340);
        }
      }
    });
  });
  function saveOther(qq){
    const $o = document.getElementById("otherInput");
    if($o) otherTexts[qq.id] = $o.value.trim();
  }
}
function saveOther(){} /* 佔位：實際邏輯在 bindQuestion 閉包內 */

function bindTask(){

/* ===== 完成頁 ===== */
function buildPayload(){
  const a = answers;
  return {
    uid: uidFrom(a.name, a.dept),
    dept: a.dept || "其他",
    topics: a.q14 || [],
    diag: buildDiagnosis(a),
    task: (a.task.task || "").slice(0, 120),
    succ: SUCC_CODE[a.task.succ] || 0,
    mat: (a.task.mat || []).map(o => MAT_CODE[o]).filter(Boolean),
    limit: LIMIT_CODE[a.task.limit] || 0,
    sens: SENS_OPTIONS.some(o => (a.q11||[]).includes(o)) ? 1 : 0,
    lit: LIT_CODE[a.q13] || 0,
    ts: Date.now()
  };
}
function uidFrom(name, dept){
  let h = 0; const str = name + "|" + dept;
  for(let i = 0; i < str.length; i++){ h = (h * 31 + str.charCodeAt(i)) >>> 0; }
  return h.toString(36);
}

function htmlDone(){
  return '<div class="st-sending"><span class="st-spinner"></span><p>正在送出你的回覆…</p></div>';
}
function bindDone(){
  const mine = buildPayload();
  if(DEMO){
    setTimeout(() => renderDoneBody(mine, MOCK_RESPONSES.concat(mine)), 800);
    return;
  }
  (async () => {
    let list = null;
    try{
      await fetch(API_BASE + "/api/response", {
        method:"POST",
        headers:{"Content-Type":"application/json","X-Class-Code":classCode},
        body: JSON.stringify(mine)
      });
    }catch(e){ console.log("[survey] submit failed", e); }
    try{
      const r = await fetch(API_BASE + "/api/responses", { headers:{"X-Class-Code":classCode} });
      if(r.status === 403){
        try{ sessionStorage.removeItem("classCode"); }catch(e){}
        classCode = "";
        gateOk = false;
        handleStats403();
        return;
      }
      if(r.ok){
        list = await r.json();
        if(!list.some(d => d.uid === mine.uid)) list = list.concat(mine);
      }
    }catch(e){ console.log("[survey] stats load failed", e); }
    renderDoneBody(mine, list);
  })();
}

function renderDoneBody(mine, list){
  const a = answers;
  const diagOnly = mine.diag.filter(c => !mine.topics.includes(c));
  const chip = (c, kind) =>
    '<span class="st-chip ' + kind + '"><span class="st-chip-code">' + c + '</span>' + CATEGORY_NAMES[c] + '</span>';
  const statsHtml = list && list.length
    ? '<div class="st-stats-head"><h3 class="st-h" style="margin:0">大家提出的方向</h3>' +
      '<label class="st-switch"><input type="checkbox" id="iviewToggle"><span class="st-switch-track"></span>講師檢視</label></div>' +
      '<div id="studentStats">' + htmlStudentStats(aggregate(list)) + '</div>' +
      '<div id="instructorStats" style="display:none">' + htmlInstructorStats(aggregate(list)) + '</div>'
    : '<h3 class="st-h">大家提出的方向</h3><p class="st-sub">目前讀不到統計資料，稍後重新整理即可，你的回覆已送出。</p>';
  $screen.querySelector(".sv-step").innerHTML =
    '<div class="st-done">' +
      '<div class="st-confirm"><span class="st-check"></span><div>' +
        '<h2 class="sv-title">已送出，' + (a.name ? esc(a.name) + "，" : "") + '課堂見</h2>' +
        '<p class="st-sub">講師已收到你的案例，工作坊會直接帶你把它做完</p></div></div>' +
      '<div class="st-plan"><h3 class="st-h">為你規劃的單元</h3>' +
        '<div class="st-chips">' + mine.topics.map(c => chip(c,"sel")).join("") + diagOnly.map(c => chip(c,"diag")).join("") + '</div>' +
        '<p class="st-sub">實心＝你自選的主題；外框＝根據你的作答習慣，建議加聽的單元</p></div>' +
      htmlSummary() +
      '<div class="st-stats">' + statsHtml + '</div>' +
      '<div class="sv-nav"><button class="sv-btn ghost" id="editBtn">回上一步修改</button><span></span></div>' +
    '</div>';
  document.getElementById("editBtn").addEventListener("click", back);
  const $sum = document.getElementById("sumToggle");
  if($sum) $sum.addEventListener("click", () => {
    const $s = document.getElementById("summaryBox");
    const open = $s.style.display === "none";
    $s.style.display = open ? "" : "none";
    $sum.parentElement.classList.toggle("open", open);
    $sum.childNodes[0].textContent = open ? "收合填答摘要" : "查看完整填答摘要";
  });
  const $iv = document.getElementById("iviewToggle");
  if($iv) $iv.addEventListener("change", () => {
    document.getElementById("instructorStats").style.display = $iv.checked ? "" : "none";
  });
}

function htmlSummary(){
  const a = answers, t = a.task;
  const fmt = q => {
    const v = a[q.id];
    const f = o => o === OTHER ? "其他（" + (otherTexts[q.id] || "未說明") + "）" : o;
    if(q.type === "topics") return v.length ? v.map(c => c + " " + CATEGORY_NAMES[c]).join("、") : "（未填）";
    return Array.isArray(v) ? (v.length ? v.map(f).join("、") : "（未填）") : (v ? f(v) : "（未填）");
  };
  const rows = QUESTIONS.map(q =>
    '<li><strong>' + esc(q.title) + '</strong><span>' + esc(fmt(q)) + '</span></li>').join("") +
    '<li><strong>課堂實作任務</strong><span>' + esc(t.task || "（未填）") + '</span></li>' +
    '<li><strong>現在的做法</strong><span>' + esc(t.now || "（未填）") + '</span></li>' +
    '<li><strong>成功標準</strong><span>' + esc(t.succ || "（未填）") + '</span></li>' +
    '<li><strong>現場素材</strong><span>' + esc(t.mat.length ? t.mat.join("、") : "（未填）") + '</span></li>' +
    '<li><strong>資料限制</strong><span>' + esc(t.limit || "（未填）") + '</span></li>';
  return '<div class="st-summary">' +
    '<button type="button" class="st-summary-toggle" id="sumToggle">查看完整填答摘要<span class="st-caret"></span></button>' +
    '<div class="st-summary-body" id="summaryBox" style="display:none">' +
      '<div class="st-summary-head">' +
        '<span><strong>姓名</strong>' + esc(a.name || "（未填）") + '</span>' +
        '<span><strong>部門</strong>' + esc(a.dept || "（未填）") + '</span>' +
        '<span><strong>工作內容</strong>' + esc(a.job || "（未填）") + '</span></div>' +
      '<ul>' + rows + '</ul></div></div>';
}

/* ===== 統計（學員層） ===== */
function htmlStudentStats(g){
  const ranked = Object.keys(CATEGORY_NAMES)
    .filter(c => (g.topicSel[c]||0) > 0)
    .sort((a,b) => (g.topicSel[b]||0) - (g.topicSel[a]||0));
  const max = Math.max(1, ...ranked.map(c => g.topicSel[c]||0));
  const deptLine = Object.entries(g.deptCount).map(([d,v]) => d + " " + v).join("・");
  const bars = ranked.map((c, i) =>
    '<div class="st-bar' + (i < 3 ? " accent" : "") + '">' +
      '<span class="st-bar-rank">' + (i+1) + '</span>' +
      '<span class="st-bar-label">' + CATEGORY_NAMES[c] + '</span>' +
      '<span class="st-bar-track"><span class="st-bar-fill" style="width:' + Math.round((g.topicSel[c]||0)/max*100) + '%"></span></span>' +
      '<span class="st-bar-num">' + (g.topicSel[c]||0) + '</span></div>').join("");
  const tasks = g.tasks.map(t =>
    '<div class="st-task"><span class="st-task-dept">' + esc(t.dept) + '</span>' +
    '<span class="st-task-text">' + esc(t.task) + '</span></div>').join("");
  return '<div class="st-student">' +
    '<div class="st-headline"><span class="st-big">' + g.n + '</span>' +
      '<span class="st-big-caption">位同仁已完成<em>' + deptLine + '</em></span></div>' +
    '<h3 class="st-h">大家最想加強的主題</h3><div class="st-rank">' + bars + '</div>' +
    '<h3 class="st-h">大家帶來的實作任務</h3>' +
    '<p class="st-sub">匿名顯示，看看其他同仁打算怎麼用</p>' +
    '<div class="st-tasks">' + tasks + '</div></div>';
}

/* ===== 統計（講師層） ===== */
function htmlMiniDist(title, labels, counts){
  const max = Math.max(1, ...counts.slice(1));
  return '<div class="st-mini"><h4>' + title + '</h4>' +
    labels.map((l, i) => i === 0 ? "" :
      '<div class="st-bar small"><span class="st-bar-label">' + l + '</span>' +
      '<span class="st-bar-track"><span class="st-bar-fill" style="width:' + Math.round(counts[i]/max*100) + '%"></span></span>' +
      '<span class="st-bar-num">' + counts[i] + '</span></div>').join("") + '</div>';
}
function htmlInstructorStats(g){
  const rows = Object.keys(CATEGORY_NAMES)
    .map(c => ({code:c, sel:g.topicSel[c]||0, diag:g.topicDiag[c]||0}))
    .filter(r => r.sel + r.diag > 0)
    .sort((a,b) => (b.sel+b.diag) - (a.sel+a.diag));
  const max = Math.max(1, ...rows.map(r => Math.max(r.sel, r.diag)));
  const db = rows.map(r => {
    const a = r.sel/max*100, b = r.diag/max*100;
    const dots = r.sel === r.diag
      ? '<span class="st-dot both" style="left:' + a + '%"></span>'
      : '<span class="st-db-line" style="left:' + Math.min(a,b) + '%;width:' + Math.abs(a-b) + '%"></span>' +
        '<span class="st-dot sel" style="left:' + a + '%"></span>' +
        '<span class="st-dot diag" style="left:' + b + '%"></span>';
    return '<div class="st-db-row">' +
      '<span class="st-db-label"><strong>' + r.code + '</strong> ' + CATEGORY_NAMES[r.code] + '</span>' +
      '<span class="st-db-track">' + dots + '</span>' +
      '<span class="st-db-nums">' + r.sel + '<i>／</i>' + r.diag + '</span></div>';
  }).join("");
  const deptCols = Object.entries(g.deptTopic).map(([dept, m]) => {
    const top = Object.entries(m).sort((a,b) => (b[1].sel+b[1].diag) - (a[1].sel+a[1].diag)).slice(0,3);
    return '<div class="st-dept-col"><h4>' + esc(dept) + '<span>' + (g.deptCount[dept]||0) + ' 位</span></h4><ol>' +
      top.map(([c,v]) => '<li><strong>' + c + '</strong> ' + CATEGORY_NAMES[c] +
        '<i>自選 ' + v.sel + '・診斷 ' + v.diag + '</i></li>').join("") + '</ol></div>';
  }).join("");
  return '<div class="st-instructor">' +
    '<h3 class="st-h">自選 vs 診斷</h3>' +
    '<p class="st-sub">兩者落差大的主題（如低自選、高診斷）值得在課堂上特別點出</p>' +
    '<div class="st-dumbbell"><p class="st-legend">' +
      '<span class="st-dot sel"></span>學員自選 <span class="st-dot diag"></span>系統診斷 ' +
      '<span class="st-dot both"></span>兩者相同' +
      '<span class="st-legend-note">診斷＝由作答習慣推導的建議單元</span></p>' + db + '</div>' +
    '<h3 class="st-h">各部門最需要的主題</h3><div class="st-dept-cols">' + deptCols + '</div>' +
    '<h3 class="st-h">資安準備度</h3><div class="st-sec-row">' +
      '<div class="st-callout"><span class="st-big">' + g.sensCount + '</span><span>位貼過敏感資料<br>或不確定界線</span></div>' +
      htmlMiniDist("「分享連結 vs 離線檔」認知", LIT_LABELS, g.litCount) + '</div>' +
    '<h3 class="st-h">備課資訊</h3><div class="st-prep-grid">' +
      htmlMiniDist("現場素材", MAT_LABELS, g.matCount) +
      htmlMiniDist("資料限制", LIMIT_LABELS, g.limitCount) +
      htmlMiniDist("成功標準", SUCC_LABELS, g.succCount) + '</div></div>';
}

render();


function handleStats403(){
  const $statsBox = document.getElementById("screen").querySelector(".st-stats");
  if(!$statsBox) return;
  $statsBox.innerHTML = '<h3 class="st-h">大家提出的方向</h3>' +
    '<p class="sv-hint">通行碼已失效，統計無法載入。請重新輸入課程公告內的通行碼：</p>' +
    '<div class="sv-gate-row" style="margin-bottom:12px">' +
      '<input type="text" id="reCode" placeholder="輸入邀請碼" autocomplete="off" style="max-width:320px">' +
      '<button class="sv-btn primary" id="reVerifyBtn">驗證</button>' +
    '</div><p class="sv-error" id="reErr" style="display:none"></p>';
  const $input = document.getElementById("reCode");
  const $btn = document.getElementById("reVerifyBtn");
  const $err = document.getElementById("reErr");
  async function reVerify(){
    const code = $input.value.trim();
    if(!code){ $err.textContent = "請輸入通行碼"; $err.style.display = "block"; $input.focus(); return; }
    $btn.disabled = true; $btn.textContent = "驗證中…"; $err.style.display = "none";
    try{
      const r = await fetch(API_BASE + "/api/verify", { headers: {"X-Class-Code": code} });
      if(r.ok){
        classCode = code;
        gateOk = true;
        try{ sessionStorage.setItem("classCode", code); }catch(e){}
        bindDone();
        return;
      }
      $err.textContent = r.status === 403 ? "通行碼不正確，請確認課程公告" : "驗證服務暫時無法使用，請稍後再試";
      $err.style.display = "block";
    }catch(e){
      $err.textContent = "連線失敗，請確認網路後再試";
      $err.style.display = "block";
    }
    $btn.disabled = false; $btn.textContent = "驗證";
    $input.focus();
  }
  $btn.addEventListener("click", reVerify);
  $input.addEventListener("keydown", e => { if(e.key === "Enter") reVerify(); });
  $input.focus();
}

</script>
