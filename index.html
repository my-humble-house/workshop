<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Claude 工作坊 課前調查</title>
<style>
  /* ===== 寒舍集團內部表單設計系統：規範見 docs/specs/2026-06-10-visual-design-system.md ===== */
  :root{
    --mhh-black:#050505;
    --mhh-ink:#2C2A24;
    --mhh-muted:#666666;
    --mhh-blue:#3B5D6B;
    --mhh-sage:#8FAF9B;
    --mhh-bronze:#81603F;
    --mhh-paper:#FFFFFF;
    --mhh-porcelain:#F6F6F6;
    --mhh-warm:#EFEAE1;
    --ink:var(--mhh-ink);                  /* 唯一內容文字色：內部表單黑褐墨色 */
    --accent:var(--mhh-blue);              /* 選中、主按鈕、進度、標籤襯底 */
    --accent-press:#284450;
    --on-accent:#FFFFFF;
    --bg:var(--mhh-porcelain);
    --paper:rgba(255,255,255,.94);
    --row:rgba(255,255,255,.86);
    --line:rgba(59,93,107,.24);
    --line-strong:rgba(59,93,107,.52);
    --shadow:rgba(44,42,36,.12);
    --bar-1:var(--mhh-blue);
    --bar-2:var(--mhh-sage);
    --bar-3:var(--mhh-bronze);
    --bar-4:#666666;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    width:100%;
    display:flex;justify-content:center;align-items:flex-start;
    padding:36px 16px;
    line-height:1.7;
    overflow-x:hidden;
  }
  /* ===== CSS 內部表單底圖：官網式留白、細線與低彩度，不使用 SVG 或分割圖 ===== */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      linear-gradient(145deg,rgba(255,255,255,.92) 0%,rgba(246,246,246,.94) 48%,rgba(239,234,225,.78) 100%);
  }
  .card{
    position:relative;z-index:1;
    width:min(100%,700px);min-width:0;
    background:var(--paper);
    -webkit-backdrop-filter:blur(10px);
    backdrop-filter:blur(10px);
    border:1px solid var(--line);
    border-top:4px solid var(--mhh-black);
    border-radius:4px;
    box-shadow:0 20px 54px var(--shadow);
    padding:30px 34px 28px;
  }
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
    .card{background:var(--mhh-paper)}
  }
  /* ===== 品牌標頭：使用 repo-local 官方 logo，避免外部熱連 ===== */
  .brand-masthead{
    display:flex;align-items:center;gap:20px;
    padding-bottom:22px;margin-bottom:22px;border-bottom:1px solid var(--line);
  }
  .brand-lockup{display:flex;align-items:center;gap:16px;min-width:0}
  .brand-logo{width:92px;height:auto;flex:none;display:block}
  .brand-copy{min-width:0}
  .brand-kicker{font-size:11px;font-weight:700;letter-spacing:.22em;color:var(--mhh-blue);line-height:1.4}
  .brand-title{font-size:20px;font-weight:700;letter-spacing:.18em;line-height:1.45;margin-top:2px}
  .brand-subtitle{font-size:13px;color:var(--mhh-muted);letter-spacing:.08em;line-height:1.5;margin-top:2px}
  /* ===== 進度條 ===== */
  .progress-wrap{margin-bottom:20px}
  .progress-label{font-size:16px;font-weight:600;letter-spacing:.18em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline}
  .progress-label span{font-size:16px}
  .p-num,.p-total{font-size:16px;font-weight:600;letter-spacing:0;line-height:1}
  .progress-bar{height:3px;background:rgba(59,93,107,.16);border-radius:0;overflow:hidden}
  .progress-fill{height:100%;background:var(--accent);border-radius:0;width:0%;transition:width .3s ease}
  @media (prefers-reduced-motion: reduce){.progress-fill{transition:none}}
  /* ===== 題目區 ===== */
  h1{font-size:24px;font-weight:700;line-height:1.45;margin-bottom:6px;letter-spacing:.04em}
  h2{font-size:20px;font-weight:700;line-height:1.5;margin-bottom:6px;letter-spacing:.03em}
  h3{font-size:12px;font-weight:700;letter-spacing:.22em;margin-bottom:12px;color:var(--mhh-blue)}
  .hint{font-size:14px;margin-bottom:16px}
  /* ===== 選項按鈕（選單類，保持規則矩形） ===== */
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
  .opt{
    width:100%;text-align:left;
    font-size:16px;font-family:inherit;color:var(--ink);
    background:var(--row);border:1px solid var(--line);border-left:3px solid var(--line);
    border-radius:2px;padding:13px 18px;cursor:pointer;
  }
  .opt:hover{border-color:var(--line-strong);border-left-color:var(--mhh-sage)}
  .opt:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .opt.selected{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:600}
  /* ===== 輸入欄位 ===== */
  .field{margin-bottom:18px}
  .field-row{display:flex;gap:12px}
  .field-row .field{flex:1}
  @media (max-width:480px){.field-row{flex-direction:column;gap:0}}
  .field label{display:block;font-size:16px;font-weight:600;margin-bottom:6px}
  input[type=text],textarea{
    width:100%;font-size:16px;font-family:inherit;color:var(--ink);
    border:1px solid var(--line);border-radius:2px;padding:12px 16px;background:var(--row);
  }
  input[type=text]::placeholder,textarea::placeholder{color:var(--ink);opacity:.45}
  input[type=text]:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:96px;resize:vertical}
  /* ===== 導覽按鈕：膠囊形 ===== */
  .nav{display:flex;justify-content:space-between;align-items:center;gap:12px}
  .btn{
    font-size:16px;font-family:inherit;font-weight:600;
    border-radius:2px;padding:12px 28px;cursor:pointer;border:1px solid transparent;
  }
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .btn-primary{background:var(--mhh-black);color:var(--on-accent)}
  .btn-primary:hover{background:var(--accent-press)}
  .btn-ghost{background:none;color:var(--ink);padding:12px 10px}
  .btn-ghost:hover{text-decoration:underline}
  /* 錯誤提示：同色票襯底膠囊，不用紅色 */
  .error{display:none;width:fit-content;background:var(--accent);color:var(--on-accent);font-size:13px;font-weight:600;border-radius:2px;padding:6px 16px;margin:-10px 0 16px}
  /* ===== 結果頁 ===== */
  .summary{
    position:relative;font-size:16px;line-height:1.55;margin-bottom:18px;
  }
  .summary-clip{position:relative;overflow:hidden;max-height:var(--summary-collapsed-height,360px)}
  .summary:not(.expanded) .summary-clip{
    -webkit-mask-image:linear-gradient(to bottom,#000 calc(100% - 56px),transparent);
    mask-image:linear-gradient(to bottom,#000 calc(100% - 56px),transparent);
  }
  .summary.expanded .summary-clip{max-height:none;-webkit-mask-image:none;mask-image:none}
  .summary-title{font-size:18px;font-weight:700;margin-bottom:8px}
  .summary-head,.summary-tags{display:flex;flex-wrap:wrap;gap:6px 14px}
  .summary-head{padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--line)}
  .summary-head span,.summary-tags span,.summary-head strong,.summary-tags strong{font-size:16px}
  .summary-head strong,.summary-tags strong{font-weight:600;margin-right:4px}
  .summary-list{list-style:none;display:flex;flex-direction:column;gap:8px}
  .summary-item{font-size:16px}
  .summary-q,.summary-a{display:inline;font-size:16px}
  .summary-q{font-weight:600}
  .summary-a::before{content:"：";font-weight:400}
  .summary-a{overflow-wrap:anywhere}
  .summary-tags{margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .summary-toggle{
    display:flex;align-items:center;gap:6px;margin:10px auto 0;padding:8px 4px;
    border:0;background:none;color:var(--ink);font-size:16px;font-family:inherit;font-weight:600;cursor:pointer;
  }
  .summary-toggle::after{
    content:"";width:9px;height:9px;border-right:2px solid currentColor;border-bottom:2px solid currentColor;
    transform:rotate(45deg);transition:transform .2s ease;margin-top:-4px;
  }
  .summary-toggle:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:2px}
  .summary.expanded .summary-toggle::after{transform:rotate(225deg);margin-top:4px}
  .done-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .other-wrap{display:none;margin-top:-2px}
  .other-wrap.show{display:block}
  /* ===== 完成後的共同統計 ===== */
  .stats{margin-top:32px;border-top:1px solid var(--line);padding-top:20px}
  .stats h2{margin-bottom:4px}
  .stats .hint{font-size:16px;margin-bottom:16px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:16px}
  .bar-label{flex:0 0 11em}
  .bar-track{flex:1;height:18px;background:var(--row);border:1px solid var(--line);border-radius:2px;overflow:hidden}
  .bar-fill{display:block;height:100%;background:var(--accent);border-radius:0}
  .bar-num{flex:0 0 2em;text-align:right;font-weight:600}
  .task-list{list-style:none;margin-top:8px}
  .task-list li{font-size:16px;padding:8px 0;display:flex;gap:10px;align-items:baseline}
  .task-list .dept-tag{flex:none;background:var(--accent);color:var(--on-accent);font-weight:600;font-size:11px;border-radius:2px;padding:2px 10px}
  @media (max-width:480px){.bar-label{flex-basis:8em}}
  @media (prefers-reduced-motion: reduce){.summary-toggle::after{transition:none}}
  @media (max-width:560px){
    body{padding:18px 12px}
    .card{padding:22px 18px 22px;border-radius:2px}
    .brand-masthead{align-items:flex-start;gap:14px}
    .brand-logo{width:76px}
    .brand-title{font-size:18px}
    h1{font-size:21px}h2{font-size:18px}
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand-masthead" aria-label="寒舍集團內部調查">
    <div class="brand-lockup">
      <img class="brand-logo" src="assets/mhh-logo.png" alt="寒舍餐旅管理顧問">
      <div class="brand-copy">
        <div class="brand-kicker">MY HUMBLE HOUSE</div>
        <div class="brand-title">寒舍集團</div>
        <div class="brand-subtitle">內部工作坊課前調查</div>
      </div>
    </div>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label"><span id="progressSection"></span><span id="progressCount"></span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div id="screen"></div>
</div>

<script>
/* ====== 教材類別定義(與內訓教材規劃一致) ====== */
const CATEGORY_NAMES = {
  A:"帳號與初始設定", B:"三種模式選擇", C:"Token 與使用效率", D:"Project 建立與管理",
  E:"報表與數字處理", F:"社群文案與自動化", G:"檔案產出與 Artifacts", H:"跨部門協作",
  I:"分享與資訊安全"
};

/* ====== 題目資料 ====== */
const QUESTIONS = [
  {id:"q1", section:"第一部分・使用現況", type:"single",
   title:"Q1. 你目前使用 Claude 的頻率？",
   options:["每天多次","每天一次","每週幾次","很少用","還沒用過"], other:true},
  {id:"q2", section:"第一部分・使用現況", type:"multi",
   title:"Q2. 你用過哪些模式？", hint:"可複選",
   options:["Chat 網頁版","手機 App","Cowork","Code","不確定自己用的是哪種"], other:true},
  {id:"q3", section:"第一部分・使用現況", type:"multi",
   title:"Q3. 你的工作固定要產出哪些東西？", hint:"可複選，不限是否用 Claude 做",
   options:["會議記錄","SOP 或流程文件","報表或 Excel","簡報","社群文案","郵件或提案","互動式工具或圖表"], other:true},
  {id:"q4", section:"第一部分・使用現況", type:"multi",
   title:"Q4. 上面這些產出，哪些已經在用 Claude 做？", hint:"可複選",
   options:["會議記錄","SOP 或流程文件","報表或 Excel","簡報","社群文案","郵件或提案","互動式工具或圖表","都還沒用 Claude 做"],
   exclusive:"都還沒用 Claude 做"},
  {id:"q5", section:"第二部分・使用習慣", type:"single",
   title:"Q5. 你通常怎麼開對話？",
   options:["一個對話從頭用到尾，什麼事都在裡面問","不同任務會開新對話","看心情，沒特別注意"], other:true},
  {id:"q6", section:"第二部分・使用習慣", type:"single",
   title:"Q6. 有固定背景（品牌調性、部門資訊）需要 Claude 知道時，你會怎麼做？",
   options:["每次對話開頭重新貼一次","已經設定在 Project Instructions","不知道可以預先設定","我的工作沒有這種需求"], other:true},
  {id:"q7", section:"第二部分・使用習慣", type:"single",
   title:"Q7. 需要 Claude 處理檔案裡的某個數字或段落時，你會？",
   options:["整份檔案直接上傳","只貼需要的那一段或那幾列","先截圖再上傳","沒遇過這種情況"], other:true},
  {id:"q8", section:"第二部分・使用習慣", type:"multi",
   title:"Q8. 你給 Claude 的檔案通常是什麼格式？", hint:"可複選",
   options:["Excel 或 CSV","電子版 PDF","掃描檔或紙本拍照","手機截圖","不會上傳檔案"], other:true},
  {id:"q9", section:"第二部分・使用習慣", type:"single",
   title:"Q9. Claude 產出不符合預期時，你通常？",
   options:["來回叫它改好幾次直到滿意","重新下一次更完整的指令","放棄，自己改","直接拿去用，沒特別發現問題"], other:true},
  {id:"q10", section:"第二部分・使用習慣", type:"multi",
   title:"Q10. 你是否遇過以下狀況？", hint:"可複選",
   options:["數字加總或計算結果出錯","用到一半被告知額度用完、要等冷卻","產出的格式每次都不一樣","讀取掃描檔或圖片時認錯字","都沒遇過"], other:true},
  {id:"q11", section:"第三部分・分享與資安", type:"multi",
   title:"Q11. 你曾經把哪些內容貼給 Claude？", hint:"可複選，據實填寫即可，這題用來安排資安單元的深度，沒有對錯。",
   options:["客人個資或訂位資料","內部成本或財務數字","未公開的活動或企劃內容","只有對外公開的資訊","不確定哪些可以貼","沒貼過任何內部內容"]},
  {id:"q12", section:"第三部分・分享與資安", type:"single",
   title:"Q12. Claude 產出的成果，你通常怎麼給同事或主管？",
   options:["傳 Artifacts 分享連結","下載成檔案用 email 或群組傳","截圖貼群組","請對方直接看我的畫面操作","沒分享過"], other:true},
  {id:"q13", section:"第三部分・分享與資安", type:"single",
   title:"Q13. 你分得清楚「分享連結」和「離線 HTML 檔」的差別嗎？",
   options:["分得清楚，兩種都用過","聽過但不確定差別在哪","第一次聽到這兩個詞"], other:true},
  {id:"q14", section:"第四部分・需求與期待", type:"multi", max:3,
   title:"Q14. 以下主題，選出你最想加強的", hint:"最多選三個",
   options:[
     "帳號與基本設定還不熟，想從頭學",
     "搞懂 Chat、Cowork、Code 什麼時候用哪個",
     "用得省：不要動不動就額度用完",
     "固定任務設定一次就好，不用每次重新解釋",
     "報表與數字處理：給對檔案、數字不出錯",
     "社群文案半自動化：一次產出整週的量",
     "產出完整檔案：簡報、Word、Excel、互動圖表",
     "跨部門協作時怎麼共用設定與成果",
     "搞懂分享連結與檔案的安全差別，避免內部資料外流"
   ]},
  {id:"q15", section:"第五部分・課堂實作", type:"multitext",
   title:"Q15. 課堂實作題：描述一個你想在課堂上完成的真實任務",
   hint:"工作坊會直接用你的任務帶你做完，寫得越具體，課堂收穫越大。",
   fields:[
     {key:"task", label:"這個任務是什麼", ph:"例：每週一要發四間館的 IG 文案，共 8 則", required:true},
     {key:"now",  label:"現在怎麼做、多久做一次", ph:"例：每次自己想文案，大約花兩小時"}
   ]},
  {id:"q16", section:"第五部分・課堂實作", type:"single",
   title:"Q16. 這個案例完成到什麼程度算成功？",
   options:["產出可用的初稿","建好之後可以重複用的模板","明顯縮短整理時間","數字不再出錯","產出可以直接分享的檔案"], other:true},
  {id:"q17", section:"第五部分・課堂實作", type:"multi",
   title:"Q17. 這個案例你現場能帶什麼素材？",
   hint:"可複選。「去識別」＝把資料裡認得出特定客人或公司機密的內容拿掉或改掉：客人姓名改成「王◯◯」或「客人 A」、電話和 email 刪除、真實營收改成比例相同的假數字。判斷方法：這份檔案如果外流，會不會認出某位客人、或洩漏內部數字？會，就要先處理。",
   options:["去識別後的 Excel／CSV","去識別後的文件（Word、PDF）","圖片或截圖","只有文字描述就夠","還沒準備好"]},
  {id:"q18", section:"第五部分・課堂實作", type:"single",
   title:"Q18. 這個案例的資料有沒有使用限制？",
   options:["我可以自己先把資料去識別再帶來","真實資料完全不能用，請幫我準備虛構範例","不確定怎麼判斷，想請講師協助改寫"]}
];

/* Q14 選項文字對應教材類別代號 */
const TOPIC_MAP = {
  "帳號與基本設定還不熟，想從頭學":"A",
  "搞懂 Chat、Cowork、Code 什麼時候用哪個":"B",
  "用得省：不要動不動就額度用完":"C",
  "固定任務設定一次就好，不用每次重新解釋":"D",
  "報表與數字處理：給對檔案、數字不出錯":"E",
  "社群文案半自動化：一次產出整週的量":"F",
  "產出完整檔案：簡報、Word、Excel、互動圖表":"G",
  "跨部門協作時怎麼共用設定與成果":"H",
  "搞懂分享連結與檔案的安全差別，避免內部資料外流":"I"
};

/* Q13/Q16/Q17/Q18 選項文字 → 匿名統計代號（與 worker validate() 的範圍一致） */
const SUCC_CODES = {"產出可用的初稿":1,"建好之後可以重複用的模板":2,"明顯縮短整理時間":3,"數字不再出錯":4,"產出可以直接分享的檔案":5};
const MAT_CODES  = {"去識別後的 Excel／CSV":1,"去識別後的文件（Word、PDF）":2,"圖片或截圖":3,"只有文字描述就夠":4,"還沒準備好":5};
const LIMIT_CODES= {"我可以自己先把資料去識別再帶來":1,"真實資料完全不能用，請幫我準備虛構範例":2,"不確定怎麼判斷，想請講師協助改寫":3};
const LIT_CODES  = {"分得清楚，兩種都用過":1,"聽過但不確定差別在哪":2,"第一次聽到這兩個詞":3};
const SUCC_LABELS = ["（未填）","產出可用的初稿","可重複用的模板","縮短整理時間","數字不再出錯","可直接分享的檔案"];
const MAT_LABELS  = ["","去識別 Excel／CSV","去識別文件","圖片或截圖","只有文字描述","還沒準備好"];
const LIMIT_LABELS= ["","自備去識別資料","需要虛構範例","需要講師協助"];
const LIT_LABELS  = ["","分得清楚","聽過但不確定","第一次聽到"];
/* Q11 中視為「敏感暴露」的選項 */
const SENS_OPTIONS = ["客人個資或訂位資料","內部成本或財務數字","不確定哪些可以貼"];

/* ====== 狀態 ====== */
let step = 0;                       // 0=基本資料, 1..N=題目, N+1=結果頁
const TOTAL = QUESTIONS.length;
const answers = { name:"", dept:"", job:"" };
QUESTIONS.forEach(q => {
  if(q.type === "multi") answers[q.id] = [];
  else if(q.type === "multitext"){ answers[q.id] = {}; q.fields.forEach(f => answers[q.id][f.key] = ""); }
  else answers[q.id] = "";
});
const otherTexts = {};              // 各題「其他」選項的自填內容

/* 課程通行碼:線上版進站即須通過 Worker 驗證;不進入回覆文字,僅存當前分頁 */
let classCode = "";
try{ classCode = sessionStorage.getItem("classCode") || ""; }catch(e){}
let gateOk = location.protocol === "file:";   // 離線 HTML 檔無統計功能,不設門禁

const $screen = document.getElementById("screen");

/* ====== 畫面渲染 ====== */
function render(){
  updateProgress();
  if(!gateOk) renderGate();
  else if(step === 0) renderIntro();
  else if(step >= 1 && step <= TOTAL) renderQuestion(QUESTIONS[step-1]);
  else renderDone();
  window.scrollTo({top:0});
}

function updateProgress(){
  const fill = document.getElementById("progressFill");
  const count = document.getElementById("progressCount");
  const sec = document.getElementById("progressSection");
  if(!gateOk){ fill.style.width = "0%"; count.innerHTML = ""; sec.textContent = "課程通行碼"; }
  else if(step === 0){ fill.style.width = "0%"; count.innerHTML = ""; sec.textContent = "基本資料"; }
  else if(step <= TOTAL){
    fill.style.width = Math.round(step/ (TOTAL+1) *100) + "%";
    count.innerHTML = '<span class="p-num">' + String(step).padStart(2,"0") + '</span><span class="p-total">／' + TOTAL + '</span>';
    sec.textContent = QUESTIONS[step-1].section;
  } else { fill.style.width = "100%"; count.innerHTML = ""; sec.textContent = "完成"; }
}

/* --- 通行碼鎖定頁:進站第一個畫面,通過 Worker 驗證才能看到問卷 --- */
function renderGate(){
  $screen.innerHTML = `
    <h1>輸入課程通行碼</h1>
    <p class="hint">本問卷僅供工作坊學員填寫。通行碼寫在課程公告裡，輸入後即可開始作答。</p>
    <div class="field">
      <label for="gCode">課程通行碼</label>
      <input type="text" id="gCode" value="${esc(classCode)}" placeholder="輸入邀請碼" autocomplete="off">
    </div>
    <p class="error" id="err"></p>
    <div class="nav">
      <span></span>
      <button class="btn btn-primary" id="gateBtn">進入問卷</button>
    </div>`;
  const $input = document.getElementById("gCode");
  const $btn = document.getElementById("gateBtn");
  const $err = document.getElementById("err");
  function showErr(msg){ $err.textContent = msg; $err.style.display = "block"; }
  async function verify(){
    const code = $input.value.trim();
    if(!code){ showErr("請輸入通行碼。"); $input.focus(); return; }
    $btn.disabled = true; $btn.textContent = "確認中…"; $err.style.display = "none";
    try{
      const r = await fetch(API_BASE + "/api/verify", { headers: {"X-Class-Code": code} });
      if(r.ok){
        classCode = code;
        try{ sessionStorage.setItem("classCode", code); }catch(e){}
        console.log("[survey] class-code verified");
        gateOk = true; render(); return;
      }
      showErr(r.status === 403 ? "通行碼不正確，請確認課程公告。" : "驗證服務暫時無法使用，請稍後再試。");
    }catch(e){
      console.log("[survey] class-code verification failed", e);
      showErr("連線失敗，請確認網路後再試。");
    }
    $btn.disabled = false; $btn.textContent = "進入問卷";
    $input.focus();
  }
  $btn.addEventListener("click", verify);
  $input.addEventListener("keydown", e => { if(e.key === "Enter") verify(); });
  /* 同分頁內重新整理:已存的通行碼自動驗證,通過就直接進入 */
  if(classCode) verify(); else $input.focus();
}

/* --- 基本資料頁 --- */
const DEPTS = ["行銷處","數位處","其他"];

/* --- 題目頁 --- */
const OTHER = "其他";

/* 判斷該題目前是否選了「其他」 */
function isOtherSelected(q){
  return q.type === "multi" ? answers[q.id].includes(OTHER) : answers[q.id] === OTHER;
}

function renderQuestion(q){
  let body = "";
  if(q.type === "text"){
    body = `<textarea id="fText" placeholder="${esc(q.placeholder||"")}">${esc(answers[q.id])}</textarea>`;
  } else if(q.type === "multitext"){
    body = q.fields.map(f => `
      <div class="field">
        <label for="mt_${f.key}">${f.label}</label>
        <textarea id="mt_${f.key}" placeholder="${esc(f.ph||"")}" style="min-height:64px">${esc(answers[q.id][f.key])}</textarea>
      </div>`).join("");
  } else {
    const opts = q.other ? q.options.concat(OTHER) : q.options;
    body = `<div class="options" id="opts">
      ${opts.map(o=>{
        const sel = q.type==="multi" ? answers[q.id].includes(o) : answers[q.id]===o;
        return `<button type="button" class="opt ${sel?"selected":""}" data-val="${esc(o)}">${o}</button>`;
      }).join("")}
      ${q.other?`<div class="other-wrap ${isOtherSelected(q)?"show":""}" id="otherWrap">
        <label for="otherInput">請說明</label>
        <input type="text" id="otherInput" value="${esc(otherTexts[q.id]||"")}" placeholder="自由填寫">
      </div>`:""}
    </div>`;
  }
  /* 進度列已顯示題號,畫面標題去掉「Qn.」前綴;摘要文字仍保留完整題號 */
  $screen.innerHTML = `
    <h2>${q.title.replace(/^Q\d+\.\s*/, "")}</h2>
    ${q.hint?`<p class="hint">${q.hint}</p>`:`<div style="height:10px"></div>`}
    ${body}
    <p class="error" id="err">請至少選擇一個選項。</p>
    <div class="nav">
      <button class="btn btn-ghost" id="backBtn">上一步</button>
      <button class="btn btn-primary" id="nextBtn">${step===TOTAL?"完成":"下一題"}</button>
    </div>`;

  const $otherWrap  = document.getElementById("otherWrap");
  const $otherInput = document.getElementById("otherInput");
  const $err = document.getElementById("err");

  /* 儲存「其他」說明文字 */
  function saveOther(){
    if($otherInput) otherTexts[q.id] = $otherInput.value.trim();
  }
  /* 儲存多欄位填寫題 */
  function saveMultitext(){
    if(q.type !== "multitext") return;
    q.fields.forEach(f => answers[q.id][f.key] = document.getElementById("mt_"+f.key).value.trim());
  }
  function showErr(msg){ $err.textContent = msg; $err.style.display = "block"; }

  if(q.type === "single"){
    document.querySelectorAll("#opts .opt").forEach(b=>{
      b.addEventListener("click", ()=>{
        answers[q.id] = b.dataset.val;
        document.querySelectorAll("#opts .opt").forEach(x=>x.classList.remove("selected"));
        b.classList.add("selected");
        if(b.dataset.val === OTHER && $otherWrap){
          /* 選「其他」時不自動前進,展開輸入欄等待填寫 */
          $otherWrap.classList.add("show");
          $otherInput.focus();
        } else {
          if($otherWrap) $otherWrap.classList.remove("show");
          setTimeout(()=>{ step++; render(); }, 220);   // 單選後自動前進
        }
      });
    });
  } else if(q.type === "multi"){
    document.querySelectorAll("#opts .opt").forEach(b=>{
      b.addEventListener("click", ()=>{
        const v = b.dataset.val;
        const arr = answers[q.id];
        const i = arr.indexOf(v);
        if(i >= 0){ arr.splice(i,1); }
        else {
          /* 有選擇上限的題目(如最多三個)到達上限時擋下並提示 */
          if(q.max && arr.length >= q.max){ showErr("這題最多選 " + q.max + " 個，請先取消一個再選。"); return; }
          arr.push(v);
        }
        $err.style.display = "none";
        b.classList.toggle("selected");
        /* 互斥選項（如 Q4「都還沒用 Claude 做」）：選它清空其餘，選其餘取消它 */
        if(q.exclusive && arr.includes(v)){
          if(v === q.exclusive){
            arr.length = 0; arr.push(q.exclusive);
          } else {
            const ex = arr.indexOf(q.exclusive);
            if(ex >= 0) arr.splice(ex, 1);
          }
          document.querySelectorAll("#opts .opt").forEach(x =>
            x.classList.toggle("selected", arr.includes(x.dataset.val)));
        }
        if(v === OTHER && $otherWrap){
          $otherWrap.classList.toggle("show", arr.includes(OTHER));
          if(arr.includes(OTHER)) $otherInput.focus();
        }
      });
    });
  }
  document.getElementById("backBtn").addEventListener("click", ()=>{
    if(q.type === "text") answers[q.id] = document.getElementById("fText").value.trim();
    saveMultitext(); saveOther();
    step--; render();
  });
  document.getElementById("nextBtn").addEventListener("click", ()=>{
    if(q.type === "text"){
      answers[q.id] = document.getElementById("fText").value.trim();
    } else if(q.type === "multitext"){
      saveMultitext();
      const req = q.fields.find(f => f.required && !answers[q.id][f.key]);
      if(req){ showErr("「" + req.label + "」是必填，請至少寫一句。"); return; }
    } else if(q.type === "single" && !answers[q.id]){
      showErr("請至少選擇一個選項。"); return;
    } else if(q.type === "multi" && answers[q.id].length === 0){
      showErr("請至少選擇一個選項。"); return;
    }
    saveOther();
    /* 選了「其他」但沒填說明:提示補填 */
    if(q.other && isOtherSelected(q) && !otherTexts[q.id]){
      showErr("你選了「其他」，請在欄位中填寫說明。");
      if($otherInput) $otherInput.focus();
      return;
    }
    step++; render();
  });
}

/* --- 教材分類自動標籤（規則表見 docs/specs/2026-06-11-survey-question-revision-design.md） --- */
function buildCategoryTags(){
  const diag = new Set();
  const a = answers;
  if(a.q1 === "還沒用過") diag.add("A");
  if(a.q2.includes("不確定自己用的是哪種")) diag.add("B");
  if(a.q5 === "一個對話從頭用到尾，什麼事都在裡面問") diag.add("C");
  if(a.q10.includes("用到一半被告知額度用完、要等冷卻")) diag.add("C");
  if(a.q6 === "每次對話開頭重新貼一次" || a.q6 === "不知道可以預先設定") diag.add("C").add("D");
  if(a.q15.task) diag.add("D");                                  // 有固定實作任務，需要 Project
  if(a.q16 === "建好之後可以重複用的模板") diag.add("D");
  if(a.q7 === "整份檔案直接上傳") diag.add("E");
  if(a.q8.includes("掃描檔或紙本拍照") || a.q8.includes("手機截圖")) diag.add("E");
  if(a.q10.includes("數字加總或計算結果出錯") || a.q10.includes("讀取掃描檔或圖片時認錯字")) diag.add("E");
  if(a.q3.includes("報表或 Excel")) diag.add("E");
  if(a.q16 === "數字不再出錯") diag.add("E");
  if(a.q3.includes("社群文案")) diag.add("F");
  if(a.q16 === "產出可用的初稿") diag.add("F");
  if(a.q3.includes("簡報") || a.q3.includes("互動式工具或圖表")) diag.add("G");
  if(a.q13 === "第一次聽到這兩個詞") diag.add("G");
  if(a.q16 === "產出可以直接分享的檔案") diag.add("G");
  if(SENS_OPTIONS.some(o => a.q11.includes(o))) diag.add("I");
  if(a.q12 === "傳 Artifacts 分享連結") diag.add("I");
  if(a.q13 === "聽過但不確定差別在哪" || a.q13 === "第一次聽到這兩個詞") diag.add("I");
  const chosen = a.q14.map(o => TOPIC_MAP[o]).filter(Boolean);
  const fmt = arr => arr.length ? arr.map(c => c + " " + CATEGORY_NAMES[c]).join("、") : "（無）";
  const diagArr = [...diag].sort();
  return { diag: fmt(diagArr), chosen: fmt(chosen), diagRaw: diagArr, chosenRaw: chosen };
}

/* --- 共同統計(由統計 API 提供;直接開離線 HTML 檔時自動略過) --- */
const API_BASE = "https://workshop-survey-api.ciracloser.workers.dev";

/* 以姓名+部門產生固定代號:同一人重填會覆蓋舊回覆,不會重複計算 */
function uidFrom(name, dept){
  let h = 0; const str = name + "|" + dept;
  for(let i = 0; i < str.length; i++){ h = (h * 31 + str.charCodeAt(i)) >>> 0; }
  return h.toString(36);
}

/* 組出匿名化回覆：只含部門、主題、診斷、任務摘要與備課代號，不含姓名與完整作答 */
function buildPayload(){
  const tags = buildCategoryTags();
  return {
    uid: uidFrom(answers.name, answers.dept),
    dept: answers.dept,
    topics: tags.chosenRaw,
    diag: tags.diagRaw,
    task: (answers.q15.task || "").slice(0, 120),
    succ: SUCC_CODES[answers.q16] || 0,
    mat: answers.q17.map(o => MAT_CODES[o]).filter(Boolean),
    limit: LIMIT_CODES[answers.q18] || 0,
    sens: SENS_OPTIONS.some(o => answers.q11.includes(o)) ? 1 : 0,
    lit: LIT_CODES[answers.q13] || 0,
    ts: Date.now()
  };
}

async function submitShared(payload){
  try{
    const r = await fetch(API_BASE + "/api/response", {
      method: "POST",
      headers: {"Content-Type": "application/json", "X-Class-Code": classCode},
      body: JSON.stringify(payload)
    });
    if(!r.ok) throw new Error("submit failed: " + r.status);
    console.log("[survey] anonymous aggregate submitted");
  }catch(e){
    console.log("[survey] anonymous aggregate submit failed", e);
    throw e;
  }
}

/* 讀取所有回覆並彙整;清單更新有短暫延遲,自己剛送出的回覆若還沒出現就先補進統計 */
async function loadShared($box, mine){
  try{
    const r = await fetch(API_BASE + "/api/responses", { headers: {"X-Class-Code": classCode} });
    if(r.status === 403){
      $box.innerHTML = '<h2>大家提出的方向</h2><p class="hint">通行碼已失效，統計無法載入。你的填答摘要仍保留在上方，請重新輸入課程公告內的通行碼。</p><button class="btn btn-ghost" id="codeBackBtn">重新輸入通行碼</button>';
      document.getElementById("codeBackBtn").addEventListener("click", ()=>{
        classCode = ""; gateOk = false; render();
      });
      return;
    }
    if(!r.ok) throw new Error("load failed: " + r.status);
    let list = await r.json();
    if(mine && !list.some(d => d.uid === mine.uid)) list = list.concat(mine);
    if(list.length <= 1){
      $box.innerHTML = '<h2>大家提出的方向</h2><p class="hint">你是第一位完成的，等其他同仁填寫後，這裡會出現大家最想學的主題統計。</p>';
      return;
    }
    const topicCount = {}; const deptCount = {}; const tasks = [];
    list.forEach(d => {
      (d.topics || []).concat(d.diag || []).forEach(t => topicCount[t] = (topicCount[t]||0) + 1);
      if(d.dept) deptCount[d.dept] = (deptCount[d.dept]||0) + 1;
      if(d.task) tasks.push({dept: d.dept, task: d.task, ts: d.ts || 0});
    });
    console.log("[survey] shared stats loaded", {count:list.length});
    renderStats($box, topicCount, deptCount, tasks, list.length);
  }catch(e){
    console.log("[survey] shared stats load failed", e);
    $box.innerHTML = '<h2>大家提出的方向</h2><p class="hint">目前讀不到統計資料，請稍後重新整理這個頁面。你的填答摘要不受影響。</p>';
  }
}

/* 繪製統計畫面:主題長條 + 各部門實作任務方向 */
const BAR_SHADES = ["var(--bar-1)","var(--bar-2)","var(--bar-3)","var(--bar-4)"];   // 依名次取底圖灰階色票
function renderStats($box, topicCount, deptCount, tasks, n){
  const entries = Object.entries(topicCount).sort((a,b) => b[1] - a[1]);
  const maxV = entries.length ? entries[0][1] : 1;
  const bars = entries.map(([c, v], i) =>
    `<div class="bar-row">
      <span class="bar-label">${c} ${CATEGORY_NAMES[c] || ""}</span>
      <span class="bar-track"><span class="bar-fill" style="width:${Math.round(v / maxV * 100)}%;background:${BAR_SHADES[Math.min(i, BAR_SHADES.length-1)]}"></span></span>
      <span class="bar-num">${v}</span>
    </div>`).join("");
  const latest = tasks.sort((a,b) => b.ts - a.ts).slice(0, 8).map(t =>
    `<li><span class="dept-tag">${esc(t.dept)}</span>${esc(t.task)}</li>`).join("");
  const deptLine = Object.entries(deptCount).map(([d, v]) => d + " " + v + " 位").join("、");
  $box.innerHTML = `
    <h2>大家提出的方向</h2>
    <p class="hint">已有 ${n} 位同仁完成（${deptLine}）。統計為匿名彙整，不顯示姓名。</p>
    <h3>最多人需要加強的主題</h3>
    ${bars}
    ${latest ? `<h3 style="margin-top:24px">其他同仁帶來的實作任務</h3>
    <p class="hint">看看別人打算怎麼用，也許有你沒想過的用法。</p>
    <ul class="task-list">${latest}</ul>` : ""}`;
}

/* --- 結果頁 --- */
function summaryAnswerText(q){
  const a = answers[q.id];
  if(q.type === "multitext"){
    return q.fields.map(f => f.label + "：" + (a[f.key] || "（未填）")).join("；");
  }
  const fmt = o => o === OTHER ? "其他（" + (otherTexts[q.id] || "未說明") + "）" : o;
  return Array.isArray(a) ? (a.length ? a.map(fmt).join("、") : "（未填）") : (a ? fmt(a) : "（未填）");
}

function buildResultSummaryHtml(){
  const rows = QUESTIONS.map(q => `
    <li class="summary-item">
      <span class="summary-q">${esc(q.title)}</span><span class="summary-a">${esc(summaryAnswerText(q))}</span>
    </li>`).join("");
  const tags = buildCategoryTags();
  return `
    <div class="summary-title">Claude 工作坊 課前調查回覆</div>
    <div class="summary-head">
      <span><strong>姓名</strong>${esc(answers.name)}</span>
      <span><strong>部門</strong>${esc(answers.dept)}</span>
      <span><strong>工作內容</strong>${esc(answers.job || "（未填）")}</span>
    </div>
    <ul class="summary-list">${rows}</ul>
    <div class="summary-tags">
      <span><strong>診斷建議</strong>${esc(tags.diag)}</span>
      <span><strong>學員自選</strong>${esc(tags.chosen)}</span>
    </div>`;
}

function initSummaryToggle(){
  const $summary = document.getElementById("summary");
  const $clip = document.getElementById("summaryClip");
  const $toggle = document.getElementById("summaryToggle");
  if(!$summary || !$clip || !$toggle) return;
  const fullHeight = $clip.scrollHeight;
  const collapsedHeight = Math.max(280, Math.round(fullHeight * 0.5));
  $summary.style.setProperty("--summary-collapsed-height", collapsedHeight + "px");
  if(fullHeight <= collapsedHeight + 12){
    $summary.classList.add("expanded");
    $toggle.hidden = true;
    return;
  }
  $toggle.addEventListener("click", ()=>{
    const expanded = $summary.classList.toggle("expanded");
    $toggle.setAttribute("aria-expanded", expanded ? "true" : "false");
    $toggle.querySelector(".summary-toggle-text").textContent = expanded ? "向上收合" : "向下展開";
    console.log("[survey] response summary toggled", {expanded});
  });
}

function renderDone(){
  const result = buildResultSummaryHtml();
  $screen.innerHTML = `
    <h1>填寫完成，最後一步</h1>
    <p class="hint">以下是你的填答摘要，匿名統計會顯示在下方。</p>
    <section class="summary" id="summary" aria-label="填答摘要">
      <div class="summary-clip" id="summaryClip">${result}</div>
      <button type="button" class="summary-toggle" id="summaryToggle" aria-expanded="false" aria-controls="summaryClip">
        <span class="summary-toggle-text">向下展開</span>
      </button>
    </section>
    <div class="done-actions">
      <button class="btn btn-ghost" id="editBtn">回上一步</button>
    </div>
    <div class="stats" id="statsBox"></div>`;
  initSummaryToggle();

  /* 網頁版:寫入共用統計後顯示大家的方向;離線 HTML 檔:說明統計僅線上網址可見 */
  const $statsBox = document.getElementById("statsBox");
  if(location.protocol !== "file:"){
    $statsBox.innerHTML = '<h2>大家提出的方向</h2><p class="hint">統計載入中。</p>';
    const mine = buildPayload();
    (async ()=>{
      try{
        try{
          await submitShared(mine);
        }catch(e){
          console.log("[survey] continuing after aggregate submit failure", e);
        }
        await loadShared($statsBox, mine);
      }catch(e){
        console.log("[survey] completion stats flow failed", e);
        $statsBox.innerHTML = '<h2>大家提出的方向</h2><p class="hint">目前讀不到統計資料，請稍後重新整理這個頁面。你的填答摘要不受影響。</p>';
      }
    })();
  } else {
    $statsBox.innerHTML = '<h2>大家提出的方向</h2><p class="hint">你開啟的是離線 HTML 檔，統計只會在線上問卷顯示。</p>';
  }

  document.getElementById("editBtn").addEventListener("click", ()=>{ step = TOTAL; render(); });
}

/* ====== 工具 ====== */
function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

render();
</script>
</body>
</html>
